services:
  mysql:
    image: mysql:8.0.39
    container_name: yczh_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: yunchuan_zhihui
      MYSQL_USER: yunchuan
      MYSQL_PASSWORD: yunchuan_dev
    ports:
      # Keep MySQL's container port at 3306; expose a less collision-prone host port.
      - "${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:1.5.8
    container_name: yczh_chromadb
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
    container_name: yczh_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://yunchuan:yunchuan_dev@mysql:3306/yunchuan_zhihui
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PRIMARY_LLM_MODEL: ${PRIMARY_LLM_MODEL:-}
      PRIMARY_REVIEW_MODEL: ${PRIMARY_REVIEW_MODEL:-}
      SECONDARY_REVIEW_MODEL: ${SECONDARY_REVIEW_MODEL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      ALLOW_FIXTURE_LLM: ${ALLOW_FIXTURE_LLM:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./storage:/app/storage
      - ./reports:/app/reports
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: yczh_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  mysql_data:
  chroma_data:
  frontend_node_modules:
