services:
  mysql:
    image: mysql:8.0.39
    container_name: yczh_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: yunchuan_zhihui
      MYSQL_USER: yunchuan
      MYSQL_PASSWORD: yunchuan_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: yczh_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://yunchuan:yunchuan_dev@mysql:3306/yunchuan_zhihui
      CHROMA_PERSIST_DIRECTORY: /app/data/chroma
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PRIMARY_LLM_MODEL: ${PRIMARY_LLM_MODEL:-}
      PRIMARY_REVIEW_MODEL: ${PRIMARY_REVIEW_MODEL:-}
      SECONDARY_REVIEW_MODEL: ${SECONDARY_REVIEW_MODEL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: yczh_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
  frontend_node_modules:
